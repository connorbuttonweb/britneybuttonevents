<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <style>
        /* BASIC PAGE RESET */
        body {
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
            background-color: #f4f4f4;
        }

        h1 { text-align: center; margin-bottom: 30px; }

        /* GALLERY CONTAINER */
        .gallery-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px; /* Space between images */
        }

        /* GALLERY ITEM (The Wrapper) */
        .gallery-item {
            height: 40vh; /* TARGET HEIGHT: Adjust this to make rows taller/shorter */
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        /* THE IMAGE ITSELF */
        .gallery-item img {
            max-height: 100%;
            min-width: 100%;
            object-fit: cover; /* Ensures the image fills the flex box neatly */
            vertical-align: bottom;
            transition: transform 0.3s ease;
        }

        /* HOVER EFFECT (Optional) */
        .gallery-item:hover img {
            transform: scale(1.05);
            cursor: pointer;
        }

        /* LAST ROW HANDLING */
        /* This prevents the last image from stretching 100% width if it's alone */
        .gallery-container::after {
            content: '';
            flex-grow: 99999;
        }

        /* CAPTION STYLING */
        .caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s ease;
            text-align: center;
        }

        .gallery-item:hover .caption {
            opacity: 1;
        }

        /* MOBILE RESPONSIVENESS */
        /* On smaller screens, make the rows shorter so we see more content */
        @media (max-width: 768px) {
            .gallery-item {
                height: 25vh;
            }
        }
        @media (max-width: 480px) {
            .gallery-item {
                height: 20vh;
            }
        }
    </style>
</head>
<body>

    <h1>Project Gallery</h1>

    <div id="gallery-container" class="gallery-grid"></div>

    <script src="gallery.js"></script>

</body>
</html>
