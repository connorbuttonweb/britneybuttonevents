<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    
    <link rel="stylesheet" href="main.css">

    <style>
        /* Add padding to account for the fixed navbar defined in main.css */
        body {
            padding-top: var(--nav-height); 
        }

        .gallery-wrapper {
            padding: 40px 0;
        }

        /* THE JUSTIFIED LAYOUT ENGINE 
           This overrides the Grid layout in main.css to match your screenshot 
        */
        .gallery-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px; /* The white space between photos */
        }

        .gallery-item {
            /* HEIGHT CONTROL:
               Change this value to make rows taller or shorter. 
               300px - 350px is usually the sweet spot for landscape photos.
            */
            height: 350px; 
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            cursor: pointer;
        }

        .gallery-item img {
            max-height: 100%;
            min-width: 100%;
            object-fit: cover;
            vertical-align: bottom;
            transition: transform 0.4s ease;
        }

        /* Hover Zoom Effect */
        .gallery-item:hover img {
            transform: scale(1.05);
        }

        /* LAST ROW HANDLING
           This invisible element pushes the last items to the left 
           so they don't stretch across the whole screen.
        */
        .gallery-container::after {
            content: '';
            flex-grow: 1000000000;
        }

        /* Responsive adjustments */
        @media (max-width: 1024px) {
            .gallery-item { height: 250px; }
        }

        @media (max-width: 768px) {
            .gallery-item { height: 200px; }
        }
        
        @media (max-width: 480px) {
            .gallery-item { height: auto; width: 100%; } /* Stack vertically on mobile */
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="container header-container">
            <div class="logo">
                <a href="index.html">My<span>Website</span></a>
            </div>
            
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#">Services</a></li>
                    <li><a href="#" class="btn-nav">Contact</a></li>
                </ul>
            </nav>

            <div class="mobile-menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <section class="section">
        <div class="container center-text">
        <h2 class="section-title">Gallery</h2>
        </div>

        <!-- Masonry gallery container -->
        <div id="gallery-container" class="gallery-grid">
        <!-- Images injected by JS -->
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <h4>About Us</h4>
                    <p>Creating beautiful spaces that inspire and delight.</p>
                </div>
                <div class="footer-col">
                    <h4>Contact</h4>
                    <ul>
                        <li>123 Main Street</li>
                        <li>contact@example.com</li>
                        <li>(555) 123-4567</li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                &copy; 2026 MyWebsite. All rights reserved.
            </div>
        </div>
    </footer>

    <script src="gallery.js"></script>

</body>
</html>
